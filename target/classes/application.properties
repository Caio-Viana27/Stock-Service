spring.application.name=StockService

spring.datasource.url=jdbc:postgresql://localhost:5432/Stock-Service-database
spring.datasource.username=postgres
spring.datasource.password=postgres

# Enable SQL logging to the console
spring.jpa.show-sql=true
# Correct property to prettify and format the SQL output
spring.jpa.properties.hibernate.format_sql=true
# Optional: Add syntax highlighting (Spring Boot 3+)
spring.jpa.properties.hibernate.highlight_sql=true

spring.flyway.url=jdbc:postgresql://localhost:5432/Stock-Service-database
spring.flyway.user=postgres
spring.flyway.password=postgres
#spring.flyway.schemas=postgresql
spring.flyway.locations=db/migration/postgres